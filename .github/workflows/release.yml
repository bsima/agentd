name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Same gate as CI: fmt, clippy -D warnings, tests, offline evals.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: ./evals/release.sh

  build:
    needs: check
    strategy:
      matrix:
        include:
          # Native runners on both architectures; musl gives fully static
          # binaries (the dependency tree is rustls-based, no OpenSSL link).
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install musl toolchain
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build
        run: cargo build --release --locked -p agent --target ${{ matrix.target }}
      - name: Package
        run: |
          set -euo pipefail
          bin="target/${{ matrix.target }}/release/agent"
          strip "$bin"
          name="agent-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$name"
          cp "$bin" LICENSE README.md "$name/"
          cp examples/models.yaml "$name/models.yaml.example"
          tar czf "$name.tar.gz" "$name"
          sha256sum "$name.tar.gz" > "$name.tar.gz.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: tarball-${{ matrix.target }}
          path: |
            agent-*.tar.gz
            agent-*.tar.gz.sha256
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: tarball-*
          merge-multiple: true
      - name: Combine checksums
        run: |
          set -euo pipefail
          cat -- *.tar.gz.sha256 > SHA256SUMS
          sha256sum -c SHA256SUMS
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            *.tar.gz SHA256SUMS
