name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Same gate as CI: fmt, clippy -D warnings, tests, offline evals.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Fail fast if the tag doesn't match the workspace crate version —
      # otherwise the released binary reports the wrong --version.
      - name: Tag matches crate version
        run: |
          set -euo pipefail
          want="${GITHUB_REF_NAME#v}"
          have="$(sed -n 's/^version = "\(.*\)"$/\1/p' Cargo.toml | head -1)"
          if [ "$want" != "$have" ]; then
            echo "tag $GITHUB_REF_NAME does not match [workspace.package] version $have" >&2
            exit 1
          fi
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: ./evals/release.sh

  build:
    needs: check
    strategy:
      matrix:
        include:
          # Native runners on both architectures; musl gives fully static
          # binaries (the dependency tree is rustls-based, no OpenSSL link).
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install musl toolchain
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build
        run: cargo build --release --locked -p agent --target ${{ matrix.target }}
      - name: Package
        run: |
          set -euo pipefail
          bin="target/${{ matrix.target }}/release/agent"
          strip "$bin"
          name="agent-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$name"
          cp "$bin" LICENSE README.md "$name/"
          cp examples/models.yaml "$name/models.yaml.example"
          tar czf "$name.tar.gz" "$name"
          sha256sum "$name.tar.gz" > "$name.tar.gz.sha256"
      # Verify the artifact exactly as a user would consume it: checksum,
      # extract, exact file set, and the binary runs and reports the tag
      # version. Native runners on both arches, so execution is real.
      - name: Verify tarball
        run: |
          set -euo pipefail
          name="agent-${GITHUB_REF_NAME}-${{ matrix.target }}"
          verify="$(mktemp -d)"
          cp "$name.tar.gz" "$name.tar.gz.sha256" "$verify/"
          cd "$verify"
          sha256sum -c "$name.tar.gz.sha256"
          tar xzf "$name.tar.gz"
          want="agent LICENSE README.md models.yaml.example"
          have="$(ls "$name" | sort | tr '\n' ' ' | sed 's/ $//')"
          if [ "$have" != "$(echo $want | tr ' ' '\n' | sort | tr '\n' ' ' | sed 's/ $//')" ]; then
            echo "tarball contents mismatch: have [$have]" >&2
            exit 1
          fi
          got="$("./$name/agent" --version)"
          if [ "$got" != "agent ${GITHUB_REF_NAME#v}" ]; then
            echo "binary reports '$got', expected 'agent ${GITHUB_REF_NAME#v}'" >&2
            exit 1
          fi
          "./$name/agent" --help > /dev/null
      - uses: actions/upload-artifact@v4
        with:
          name: tarball-${{ matrix.target }}
          path: |
            agent-*.tar.gz
            agent-*.tar.gz.sha256
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: tarball-*
          merge-multiple: true
      - name: Combine checksums
        run: |
          set -euo pipefail
          cat -- *.tar.gz.sha256 > SHA256SUMS
          sha256sum -c SHA256SUMS
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            *.tar.gz SHA256SUMS
